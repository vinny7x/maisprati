<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/form.css">
    <title>Login</title>
</head>
<body>
    <main class="principal">
        <form id="form-login" class="formulario">
            <h1>Entrar</h1>

            <label for="emil">E-mail</label>
            <input type="email" name="email" id="email" placeholder="exemplo@email.com" required>

            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" required>

            <p id="aviso"></p>

            <button type="submit" class="btn">Entrar</button>

            <p class="rodape-form">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
        </form>
        <script type="module" src="js/login.js"></script>
    </main>
</body>
</html>
